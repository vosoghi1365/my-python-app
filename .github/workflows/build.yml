name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev libssl-dev tcl-dev tk-dev \
        zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev \
        libsqlite3-dev libreadline-dev uuid-dev fontconfig libfreetype6-dev \
        autoconf libtool pkg-config
        pip install --upgrade pip setuptools wheel
        pip install Cython==0.29.36 buildozer

    - name: Setup Android SDK and Build-Tools
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.0

    - name: Link Android SDK to Buildozer
      run: |
        mkdir -p ~/.buildozer/android/platform/
        ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk

    - name: Build with Buildozer
      run: |
        buildozer -v android debug
      env:
        BUILDOZER_WARN_ON_ROOT: 1

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vosoghi-Scanner-APK
        path: bin/*.apk
